apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web
  namespace: argocd 
spec:
  project: default
  source:
    repoURL: 'https://github.com/truongcongtu318/tutruong-aws-accelerator-p2.git'
    path: 'cloud/w9/lab/gitops/k8s'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true