apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-be
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/truongcongtu318/tutruong-aws-accelerator-p2.git
    targetRevision: main
    path: cloud/w9/lab/gitops/k8s/web-be
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
