apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web
  namespace: gitops-demo
spec:
  replicas: 7
  selector:
    matchLabels:
      app: demo-web
  template:
    metadata:
      labels:
        app: demo-web
    spec:
      containers:
        - name: web
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
