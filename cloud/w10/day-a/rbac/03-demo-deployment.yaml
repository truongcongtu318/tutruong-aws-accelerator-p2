# ---------- Demo: deploy 1 app bằng developer role (chạy với developer-sa) ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web
  namespace: w10-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-web
  template:
    metadata:
      labels:
        app: demo-web
    spec:
      serviceAccountName: developer-sa
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: demo-web
  namespace: w10-demo
spec:
  selector:
    app: demo-web
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
