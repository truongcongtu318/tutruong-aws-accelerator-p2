# ---------- ServiceAccount cho ESO (cần IRSA binding để truy cập AWS Secrets Manager) ----------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-sa
  namespace: w10-demo
  annotations:
    # Trong môi trường thực tế, annotation này sẽ được EKS tự động gán
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/eso-secrets-manager-role"
