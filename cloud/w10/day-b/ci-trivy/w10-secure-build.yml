# GitHub Actions Workflow: Security Scan + Image Build + Sign
# Tích hợp CI/CD pipeline bảo mật gồm Trivy scan, Cosign signing

name: W10 Secure Build & Supply Chain

on:
  pull_request:
    branches: [main]
    paths:
      - "cloud/w10/day-b/**"
      - "Dockerfile"
      - "src/**"
  push:
    branches: [main]
    paths:
      - "cloud/w10/day-b/**"
      - "Dockerfile"
      - "src/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ######################################################################
  # JOB 1: Scan source + dependencies (CI check trước khi build)
  ######################################################################
  security-scan:
    name: Trivy Source Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (repo mode)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  ######################################################################
  # JOB 2: Build, Scan image, Sign, Push
  ######################################################################
  build-and-sign:
    name: Build, Scan & Sign Image
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write
      id-token: write  # Cho Cosign keyless OIDC

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Đăng nhập container registry ---
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build và push image ---
      - name: Build and push Docker image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # --- Quét ảnh với Trivy (fail nếu có HIGH/CRITICAL) ---
      - name: Run Trivy on built image
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-image-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif

      # --- Ký image với Cosign (key-based) ---
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign image with Cosign key
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # --- (Optional) Xác minh chữ ký ngay trong CI ---
      - name: Verify image signature
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          echo "${{ secrets.COSIGN_PUBLIC_KEY }}" > /tmp/cosign.pub
          cosign verify --key /tmp/cosign.pub \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
